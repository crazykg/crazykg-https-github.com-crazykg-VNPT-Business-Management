name: Codex PR Review

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Authenticate Codex
        env:
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
        run: |
          if [ -z "$CODEX_API_KEY" ]; then
            echo "Missing CODEX_API_KEY repository secret" >&2
            exit 1
          fi
          printenv CODEX_API_KEY | codex login --with-api-key

      - name: Run Codex review
        env:
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
        run: |
          mkdir -p .codex-artifacts
          cat .github/codex/prompts/review.md | codex exec review \
            --base "origin/${{ github.base_ref }}" \
            --full-auto \
            --output-last-message .codex-artifacts/review.md \
            -

      - name: Upsert PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = ".codex-artifacts/review.md";
            const marker = "<!-- codex-pr-review -->";
            const body = `${marker}\n## Codex Review\n\n${fs.readFileSync(path, "utf8").trim()}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
